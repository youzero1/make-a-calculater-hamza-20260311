version: '3.8'

services:
  calculator-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=./data/calculator.db
    volumes:
      - calculator_data:/app/data
    restart: unless-stopped

volumes:
  calculator_data:
